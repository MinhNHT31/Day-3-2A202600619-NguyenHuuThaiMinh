<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Finance Agent - Budget Advisor</title>
  <meta name="description" content="AI-powered personal finance agent." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <!-- Header -->
  <header class="header" id="header">
    <div class="header-left">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L26 8V20L14 26L2 20V8L14 2Z" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
            <path d="M14 8L20 11V17L14 20L8 17V11L14 8Z" fill="url(#logoGrad)" opacity="0.6"/>
            <defs><linearGradient id="logoGrad" x1="2" y1="2" x2="26" y2="26"><stop stop-color="#F59E0B"/><stop offset="1" stop-color="#10B981"/></linearGradient></defs>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">Personal Finance</h1>
          <p class="logo-sub">Budget &middot; Salary &middot; Rent</p>
        </div>
      </div>
    </div>
    <div class="header-center">
      <div class="mode-switcher" id="modeSwitcher">
        <button class="mode-btn active" data-mode="chatbot" id="btnChatbot">
          <span class="mode-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          </span>
          <span class="mode-label">Chatbot</span>
        </button>
        <button class="mode-btn" data-mode="v1" id="btnV1">
          <span class="mode-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          </span>
          <span class="mode-label">Agent v1</span>
        </button>
        <button class="mode-btn" data-mode="v2" id="btnV2">
          <span class="mode-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </span>
          <span class="mode-label">Agent v2</span>
        </button>
        <div class="mode-indicator" id="modeIndicator"></div>
      </div>
    </div>
    <div class="header-right">
      <button class="metrics-btn" id="metricsBtn" title="Session Metrics">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
      </button>
      <div class="status-badge" id="statusBadge">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">
    <!-- Chat area -->
    <section class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages">
        <!-- Welcome message -->
        <div class="welcome-card" id="welcomeCard">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <circle cx="24" cy="24" r="22" stroke="url(#wGrad)" stroke-width="2" fill="none"/>
              <path d="M16 24L22 30L32 18" stroke="url(#wGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
              <defs><linearGradient id="wGrad" x1="4" y1="4" x2="44" y2="44"><stop stop-color="#F59E0B"/><stop offset="1" stop-color="#10B981"/></linearGradient></defs>
            </svg>
          </div>
          <h2>Personal Finance Agent</h2>
          <p>Tư vấn quản lý tài chính và chi tiêu thông minh</p>
          <div class="welcome-grid">
            <button class="suggestion-chip" data-query="Tôi có thu nhập 10 triệu/tháng, hãy gợi ý cách chi tiêu.">
              <span class="chip-icon">📖</span> Tư vấn cơ bản
            </button>
            <button class="suggestion-chip" data-query="Tôi 22 tuổi, thu nhập 10 triệu/tháng, sống tại Hà Nội.">
              <span class="chip-icon">📍</span> Tư vấn theo địa phương
            </button>
            <button class="suggestion-chip" data-query="Tôi nhận lương 10 triệu (Gross), trọ ở Cầu Giấy nhưng đi làm ở Thanh Xuân, di chuyển bằng xe máy.">
              <span class="chip-icon">⚡</span> Tư vấn cá nhân hoá (Real-time)
            </button>
            <button class="suggestion-chip" data-query="Lương 15 triệu, trọ Đống Đa làm ở Hà Đông thì chi tiêu thế nào?">
              <span class="chip-icon">💰</span> Kịch bản Đống Đa - Hà Đông
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Input area -->
    <div class="input-area" id="inputArea">
      <div class="input-wrapper">
        <div class="input-container">
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="Nhập câu hỏi về quản lý chi tiêu, lương bổng..."
            rows="1"
            maxlength="2000"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="input-meta">
          <span class="mode-badge" id="currentModeBadge">Chatbot</span>
          <span class="char-counter" id="charCounter">0 / 2000</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Metrics panel (slide-in) -->
  <aside class="metrics-panel" id="metricsPanel">
    <div class="metrics-header">
      <h3>Session Metrics</h3>
      <button class="close-btn" id="closeMetrics">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="metrics-body" id="metricsBody">
      <p class="metrics-empty">No data yet. Send a message first.</p>
    </div>
  </aside>

  <!-- Trace panel (slide-in) -->
  <aside class="trace-panel" id="tracePanel">
    <div class="trace-header">
      <h3>Agent Trace</h3>
      <button class="close-btn" id="closeTrace">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="trace-body" id="traceBody"></div>
  </aside>

  <!-- Overlay -->
  <div id="overlay" class="overlay"></div>

  <script src="app.js"></script>
</body>
</html>
